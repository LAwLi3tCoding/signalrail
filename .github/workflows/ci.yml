name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.23.x"
          cache: true
      - name: Download dependencies
        run: go mod download
      - name: Format
        shell: bash
        run: |
          test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
      - name: Build
        run: go build ./cmd/signalrail
      - name: Smoke
        if: runner.os != 'Windows'
        run: ./scripts/smoke.sh
      - name: Smoke Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/smoke.ps1
      - name: Renderer benchmark
        if: runner.os == 'Linux'
        run: go test -run '^$' -bench Render -benchmem -benchtime=100x ./internal/render
